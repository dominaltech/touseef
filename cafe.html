<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Brand | Cafe Middle East</title>
  <meta name="description" content="Explore Cafe Middle East, a premium dining experience curated by Touseef Shaikh.">
  
  <!-- Modern grotesque Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* DESIGN TOKENS (identical to index.html for visual consistency) */
    :root {
      --bg-color: #FFFFFF;
      --text-color: #111111;
      --accent-color: #D91E1E; /* Deep executive red */
      --border-color: #111111;
      --border-color-light: #E0E0E0;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --transition-speed: 0.3s;
      --transition-ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* BACKGROUND CREATIVITY / SLIDE ANIMATION */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -10;
      overflow: hidden;
      pointer-events: none;
      background: #FFFFFF;
    }
    
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.08;
      animation: float 25s infinite ease-in-out;
    }
    
    .bg-shape-1 {
      width: 40vw;
      height: 40vw;
      background-color: var(--accent-color);
      top: -10vw;
      left: -10vw;
      animation-duration: 25s;
    }
    
    .bg-shape-2 {
      width: 50vw;
      height: 50vw;
      background-color: #D0D0D0;
      bottom: -15vw;
      right: -15vw;
      animation-delay: -5s;
      animation-duration: 32s;
    }
    
    .bg-shape-3 {
      width: 30vw;
      height: 30vw;
      background-color: var(--accent-color);
      top: 35vh;
      left: 65vw;
      animation-delay: -12s;
      animation-duration: 20s;
      opacity: 0.04;
    }
    
    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(8vw, 6vh) scale(1.05);
      }
      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    /* BASE RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* HEADER & NAV */
    header {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color-light);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
      text-decoration: none;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.1em;
      transition: color var(--transition-speed) var(--transition-ease);
    }

    .back-link svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-color);
      stroke-width: 1.5px;
      fill: none;
      transition: stroke var(--transition-speed) var(--transition-ease),
                  transform var(--transition-speed) var(--transition-ease);
    }

    .back-link:hover {
      color: var(--accent-color);
    }

    .back-link:hover svg {
      stroke: var(--accent-color);
      transform: translateX(-4px);
    }

    .wordmark {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* MAIN CONTAINER */
    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin: 4rem 0;
    }

    /* HERO SECTION */
    .hero {
      margin-bottom: 4rem;
      max-width: 800px;
    }

    .hero-title-container {
      display: flex;
      align-items: stretch;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .red-rule {
      width: 1.5px;
      background-color: var(--accent-color);
      flex-shrink: 0;
    }

    .hero-title {
      font-weight: 200;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      color: #555555;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    /* GRID SECTION */
    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      width: 100%;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
    }

    /* IMAGE FRAME & FALLBACK */
    .item-image-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      border: 1px solid var(--border-color);
      background-color: #F5F5F5;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
      transition: transform 0.4s var(--transition-ease),
                  box-shadow 0.4s var(--transition-ease),
                  border-color 0.4s var(--transition-ease);
    }

    .image-fallback {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #F0F0F0;
      color: #888888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-align: center;
      padding: 1.5rem;
    }

    .item-image-frame img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      z-index: 2;
      transition: opacity 0.5s var(--transition-ease);
    }

    .item-image-frame img.loaded {
      opacity: 1;
    }

    /* HOVER ANIMATION (Desktop Only) */
    @media (hover: hover) {
      .grid-item:hover .item-image-frame {
        transform: translateY(-4px) scale(1.015);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.07);
        border-color: var(--accent-color);
      }
    }

    /* CAPTION / INFO BLOCK */
    .item-info {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .item-name {
      font-size: 1.1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .red-underline {
      width: 32px;
      height: 1.5px;
      background-color: var(--accent-color);
    }

    /* SCROLL REVEAL CLASS */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s var(--transition-ease),
                  transform 0.8s var(--transition-ease);
    }

    .scroll-reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* FOOTER */
    footer {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border-color-light);
    }

    .footer-dominal {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.15em;
    }

    .footer-dominal img {
      height: 4em;
      width: auto;
    }



    /* FLOATING INSTAGRAM BUTTON */
    .floating-ig {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 55px;
      height: 55px;
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: transform var(--transition-speed) var(--transition-ease), box-shadow var(--transition-speed) var(--transition-ease);
      color: #FFFFFF;
    }
    .floating-ig svg {
      width: 26px;
      height: 26px;
      stroke: #FFFFFF;
      stroke-width: 1.8;
      fill: none;
    }
    .floating-ig:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(214, 36, 159, 0.4);
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
      text-decoration: none;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.15em;
      transition: color var(--transition-speed) var(--transition-ease);
    }

    .social-link svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-color);
      stroke-width: 1.2px;
      fill: none;
      transition: stroke var(--transition-speed) var(--transition-ease);
    }

    .social-link:hover {
      color: var(--accent-color);
    }

    .social-link:hover svg {
      stroke: var(--accent-color);
    }

    /* RESPONSIVE LAYOUTS */
    @media (max-width: 820px) {
      body {
        padding: 1.5rem;
      }

      main {
        margin: 2.5rem 0;
      }

      .hero {
        margin-bottom: 2.5rem;
      }

      .items-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .item-image-frame {
        aspect-ratio: 16/9;
      }
    }
  </style>
</head>
<body>

  <!-- Elegant background animation elements -->
  <div class="bg-animation">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
  </div>

  <!-- Navigation Bar -->
  <header>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>Back</span>
    </a>
    <!-- COMMENT: Replace with Cafe Brand wordmark -->
    <div class="wordmark">Cafe Middle East</div>
  </header>

  <!-- Cafe Showcase -->
  <main>
    <!-- Brand Header -->
    <section class="hero">
      <div class="hero-title-container">
        <span class="red-rule"></span>
        <!-- COMMENT: Replace with Cafe Brand Title -->
        <h1 class="hero-title">Cafe Middle East</h1>
      </div>
      <!-- COMMENT: Replace with Cafe Brand Tagline -->
      <p class="hero-tagline">Signature culinary craft from the heart of the Middle East.</p>
    </section>

    <!-- Signature Menu Items Grid -->
    <section class="items-grid">
      
      <!-- Item 1: Hot Dog -->
      <div class="grid-item scroll-reveal">
        <!-- COMMENT: Replace 'hotdog bun.png' image filename -->
        <div class="item-image-frame">
          <div class="image-fallback">
            <span>Hot Dog</span>
            <span style="font-size: 0.65rem; margin-top: 0.5rem; opacity: 0.6;">Image Placeholder</span>
          </div>
          <img src="hotdog bun.png" alt="Signature Hot Dog" onload="this.classList.add('loaded')" onerror="this.style.display='none';">
        </div>
        <div class="item-info">
          <h2 class="item-name">Hot Dog Bun</h2>
          <span class="red-underline"></span>
        </div>
      </div>

      <!-- Item 2: Crispy Roll -->
      <div class="grid-item scroll-reveal">
        <!-- COMMENT: Replace 'Crispyroll.jpg' image filename -->
        <div class="item-image-frame">
          <div class="image-fallback">
            <span>Crispy Roll</span>
            <span style="font-size: 0.65rem; margin-top: 0.5rem; opacity: 0.6;">Image Placeholder</span>
          </div>
          <img src="Crispyroll.jpg" alt="Signature Crispy Roll" onload="this.classList.add('loaded')" onerror="this.style.display='none';">
        </div>
        <div class="item-info">
          <h2 class="item-name">Crispy Chicken Roll</h2>
          <span class="red-underline"></span>
        </div>
      </div>

    </section>
  </main>

  <footer>
    <a href="https://dominal.in" target="_blank" rel="noopener noreferrer" class="footer-dominal" style="text-decoration: none; gap: 0.25rem;">
      <span>Built by Dominal</span>
      <img src="dominallogo.png" alt="Dominal Logo" style="height: 2em; width: auto;">
    </a>
  </footer>

  <!-- Floating Instagram Button -->
  <a href="https://www.instagram.com/cafemiddleeast" target="_blank" rel="noopener noreferrer" class="floating-ig" aria-label="Instagram">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
      <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
      <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
    </svg>
  </a>

  <script>    // SCROLL-TRIGGERED ENTRANCE REVEAL (Intersection Observer)
    document.addEventListener('DOMContentLoaded', () => {
      const observerOptions = {
        root: null, // Viewport-relative
        threshold: 0.1, // Trigger when 10% visible
        rootMargin: '0px 0px -40px 0px' // Trigger slightly before entering fully
      };

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target); // Animate once
          }
        });
      }, observerOptions);

      // Target all grid items set for reveal
      const revealItems = document.querySelectorAll('.scroll-reveal');
      revealItems.forEach(item => {
        observer.observe(item);
      });
    });
  </script>
</body>
</html>
